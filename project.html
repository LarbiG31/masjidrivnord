<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Project - Masjid Riv Nord</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="lang-switcher">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('fr')">FR</button>
    <button onclick="setLang('ar')">AR</button>
</div>

<header class="hero">
    <img src="logo.png" class="logo-corner" alt="Logo">
    <h1 data-en="Building Project" data-fr="Projet de Bâtiment" data-ar="مشروع بناء المسجد">Building Project</h1>
    <nav>
    <a href="index.html" data-en="Home" data-fr="Accueil" data-ar="الرئيسية">Home</a>
    <a href="project.html" data-en="Project" data-fr="Projet" data-ar="المشروع">Project</a>
    <a href="prayer.html" data-en="Prayer Times" data-fr="Heures de prière" data-ar="مواقيت الصلاة">Prayer Times</a>
    <a href="contact.html" data-en="Contact" data-fr="Contact" data-ar="اتصل بنا">Contact</a>
</nav>

</header>

<main>
    <section class="welcome-section">
        <h2 data-en="Our Vision" data-fr="Notre Vision" data-ar="رؤيتنا">Our Vision</h2>
        <p id="project-description" style="line-height: 1.6; white-space: pre-wrap;">Loading description...</p>
    </section>

    <section class="card">
        <div style="text-align: center; margin-bottom: 20px;">
            <button onclick="showMedia('photo')" class="btn" style="background:#444;">Photos</button>
            <button onclick="showMedia('video')" class="btn" style="background:#444;">Video</button>
        </div>

        <div id="media-photo" class="media-container">
            <img src="project/image1.jpg" style="width:100%; border-radius:10px; margin-bottom:10px;">
            <img src="project/image2.jpg" style="width:100%; border-radius:10px;">
        </div>

        <div id="media-video" class="media-container" style="display:none;">
            <iframe id="project-video-iframe" width="100%" height="450" src="" frameborder="0" allowfullscreen style="border-radius:10px;"></iframe>
        </div>
    </section>
</main>


<script src="script.js"></script>
<script>
    function showMedia(type) {
        document.getElementById('media-photo').style.display = (type === 'photo') ? 'block' : 'none';
        document.getElementById('media-video').style.display = (type === 'video') ? 'block' : 'none';
    }
</script>
</body>
</html>
