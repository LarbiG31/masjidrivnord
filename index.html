<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masjid Riv Nord</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="lang-switcher">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('fr')">FR</button>
    <button onclick="setLang('ar')">AR</button>
</div>

<header class="hero">
    <div class="hero-content">
        <img src="logo.png" class="logo" alt="Masjid Riv Nord Logo">
        <h1 data-en="Masjid Riv Nord" data-fr="Masjid Riv Nord" data-ar="مسجد ريف نور">Masjid Riv Nord</h1>
        <nav>
            <a href="index.html" data-en="Home" data-fr="Accueil" data-ar="الرئيسية">Home</a>
            <a href="prayer.html" data-en="Prayer Times" data-fr="Heures de prière" data-ar="مواقيت الصلاة">Prayer Times</a>
            <a href="contact.html" data-en="Contact" data-fr="Contact" data-ar="اتصل بنا">Contact</a>
        </nav>
    </div>
</header>

<main>
    <section class="welcome-section">
        <h2 data-en="Welcome" data-fr="Bienvenue" data-ar="مرحبا بكم">Welcome</h2>
        <p data-en="Masjid Riv Nord serves the Muslim community of Saint-Jérôme." data-fr="Masjid Riv Nord sert la communauté musulmane de Saint-Jérôme." data-ar="مسجد ريف نور يخدم الجالية المسلمة في سان جيروم.">Masjid Riv Nord serves the Muslim community of Saint-Jérôme.</p>
    </section>

    <section class="grid">
        <div class="card">
            <h3 data-en="Arabic School" data-fr="École d'arabe" data-ar="المدرسة العربية">Arabic School</h3>
            <p data-en="Registration is open." data-fr="L'inscription est ouverte." data-ar="التسجيل مفتوح.">Registration is open.</p>
        </div>
        <div class="card">
            <h3 data-en="Donate" data-fr="Donner" data-ar="تبرع">Donate</h3>
            <p data-en="Support our permanent building fund." data-fr="Soutenez notre fonds de bâtiment." data-ar="دعم صندوق بناء المسجد.">Support our permanent building fund.</p>
            <a href="https://www.paypal.com" class="btn" data-en="Donate" data-fr="Donner" data-ar="تبرع">Donate</a>
        </div>
    </section>
</main>

<script src="script.js"></script>

</html>
