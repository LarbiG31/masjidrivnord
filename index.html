<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masjid Riv Nord</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="lang-switcher">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('fr')">FR</button>
    <button onclick="setLang('ar')">AR</button>
</div>

<header class="hero">
    <img src="logo.png" class="logo-corner" alt="Logo">
    <h1 data-en="Masjid Riv Nord" data-fr="Masjid Riv Nord" data-ar="مسجد ريف نور">Masjid Riv Nord</h1>
    <nav>
        <a href="index.html" data-en="Home" data-fr="Accueil" data-ar="الرئيسية">Accueil</a>
        <a href="project.html" data-en="Project" data-fr="Projet" data-ar="المشروع">Projet</a>
        <a href="prayer.html" data-en="Prayer Times" data-fr="Heures de prière" data-ar="مواقيت الصلاة">Heures de prière</a>
        <a href="contact.html" data-en="Contact" data-fr="Contact" data-ar="اتصل بنا">Contact</a>
    </nav>
</header>
<main>
    <section class="welcome-section">
        <h2 data-en="Welcome" data-fr="Bienvenue" data-ar="مرحبا بكم">Welcome</h2>
        <p data-en="Masjid Riv Nord serves the Muslim community of Saint-Jérôme." data-fr="Masjid Riv Nord sert la communauté musulmane de Saint-Jérôme." data-ar="مسجد ريف نور يخدم الجالية المسلمة في سان جيروم.">Masjid Riv Nord serves the Muslim community of Saint-Jérôme.</p>
    </section>

    <section class="grid">
        <div class="card">
            <h3 data-en="Latest News" data-fr="Dernières Nouvelles" data-ar="آخر الأخبار">Latest News</h3>
            <div id="fb-root"></div>
            <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v17.0"></script>
            <div class="fb-page" 
                data-href="https://www.facebook.com/profile.php?id=100086333900344" 
                data-tabs="timeline" 
                data-height="500" 
                data-small-header="true" 
                data-adapt-container-width="true" 
                data-hide-cover="false">
            </div>
        </div>

        <div class="card">
    <h3 data-en="Building Fund Goal" data-fr="Objectif Fond de Bâtiment" data-ar="هدف صندوق بناء المسجد">Building Fund Goal</h3>
    
    <div class="progress-container" style="background: #e0e0e0; border-radius: 20px; margin: 20px 0; height: 25px; position: relative; overflow: hidden;">
        <div id="progress-bar" class="progress-fill" style="background: var(--primary-green); width: 0%; height: 100%; transition: width 1.5s ease-in-out;"></div>
    </div>
    
    <div style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; font-size: 0.9rem;">
        <span>$<span id="collected-amount">0</span></span>
        <span>$<span id="goal-amount">0</span></span>
    </div>

    <p data-en="Help us secure a permanent home for our community." data-fr="Aidez-nous à sécuriser un foyer permanent pour notre communauté." data-ar="ساعدنا في تأمين مقر دائم لمجتمعنا.">Help us secure a permanent home for our community.</p>
    
    <div style="display: flex; gap: 10px; margin-top: 15px;">
        <a href="https://www.paypal.com" class="btn" style="flex: 1; text-align: center;" data-en="Donate" data-fr="Donner" data-ar="تبرع">Donate</a>
        <a href="project.html" class="btn" style="flex: 1; text-align: center; background: #444;" data-en="Learn More" data-fr="En savoir plus" data-ar="لمزيد من المعلومات">Learn More</a>
    </div>
</div>



    <section class="contact-widget">
        <h3 data-en="Connect With Us" data-fr="Contactez-nous" data-ar="تواصل معنا">Connect With Us</h3>
        <div class="widget-grid">
            <div class="widget-item"><i class="fas fa-phone"></i> (450) 694-2206</div>
            <div class="widget-item"><i class="fas fa-envelope"></i> masjidrivnord@gmail.com</div>
            <div class="widget-social">
                <a href="https://www.facebook.com/share/1AmzJvjMWP/" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://chat.whatsapp.com/I94Uq8UrA2m0HjQVRyhX6O" target="_blank"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </section>
</main>

<script src="script.js"></script>

</html>
